version: 2
updates:
  # Application dependencies — security-relevant for a zero-knowledge vault.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into one PR to reduce review load;
      # majors come as individual PRs so they get scrutiny.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the CI actions themselves patched.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
